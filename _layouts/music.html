---
layout: default
---
<div class="box content collection-index">
  <h1 class="navy">Music</h1>
  <hr>
  <ul class="entry-list">
    {% for music in site.music %}
    <li class="entry-list__item">
      <div class="entry-list__header">
        <a href="{{ music.url }}" class="entry-list__title navy">{{ music.title }}</a>
      </div>
      <p class="entry-list__excerpt">{{ music.content | markdownify | strip_html | truncatewords: 25 }}</p>
    </li>
    {% endfor %}
  </ul>
</div>
