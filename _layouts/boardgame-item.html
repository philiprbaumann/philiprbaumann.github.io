---
layout: default
---
<div class="box content single-page">
  <a href="/boardgames" class="back-link">← Board Games</a>
  <div class="movie-single__header">
    <h1 class="navy">{{ page.title }}</h1>
    <span class="movie-single__rating">{{ page.rating }}</span>
  </div>
  {% if page.players or page.time %}
  <p class="single-page__date">
    {% if page.players %}{{ page.players }} players{% endif %}
    {% if page.players and page.time %} · {% endif %}
    {% if page.time %}{{ page.time }}{% endif %}
  </p>
  {% endif %}
  <hr>
  {{ content }}
</div>
